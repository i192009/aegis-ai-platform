{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "aegis.fullname" . }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts: [{{ .Values.ingress.host | quote }}]
      secretName: {{ .Values.ingress.tlsSecretName }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /v1/chat
            pathType: Prefix
            backend:
              service:
                name: {{ include "aegis.fullname" . }}-gateway
                port: {name: http}
          - path: /v1/requests
            pathType: Prefix
            backend:
              service:
                name: {{ include "aegis.fullname" . }}-gateway
                port: {name: http}
          - path: /v1/evaluations
            pathType: Prefix
            backend:
              service:
                name: {{ include "aegis.fullname" . }}-evaluation-api
                port: {name: http}
{{- end }}
