{{- range $name, $service := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aegis.fullname" $ }}-{{ $name }}
  labels:
    {{- include "aegis.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  replicas: {{ $service.replicas }}
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aegis.name" $ }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "aegis.name" $ }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: {{ $name }}
    spec:
      serviceAccountName: {{ include "aegis.fullname" $ }}-{{ $name }}
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "aegis.name" $ }}
              app.kubernetes.io/instance: {{ $.Release.Name }}
              app.kubernetes.io/component: {{ $name }}
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "aegis.name" $ }}
              app.kubernetes.io/instance: {{ $.Release.Name }}
              app.kubernetes.io/component: {{ $name }}
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.global.imageRegistry }}/{{ $service.image }}:{{ $.Values.global.imageTag }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "aegis.fullname" $ }}
          env:
            - name: AEGIS_HTTP_ADDRESS
              value: ":{{ $service.port }}"
            - name: AEGIS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.global.secretName }}
                  key: {{ $.Values.global.databaseURLSecretKey }}
            - name: AEGIS_API_KEY_PEPPER
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.global.secretName }}
                  key: {{ $.Values.global.apiKeyPepperSecretKey }}
            - name: AEGIS_RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.global.secretName }}
                  key: {{ $.Values.global.rabbitMQURLSecretKey }}
            - name: AEGIS_PROVIDER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.global.secretName }}
                  key: {{ $.Values.global.providerAPIKeySecretKey }}
                  optional: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            {{- toYaml $service.resources | nindent 12 }}
          startupProbe:
            httpGet: {path: /health/live, port: http}
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet: {path: /health/live, port: http}
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet: {path: /health/ready, port: http}
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
{{- end }}
