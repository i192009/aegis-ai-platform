{{- if .Values.gatewayAPI.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "aegis.fullname" . }}
spec:
  parentRefs:
    - name: {{ .Values.gatewayAPI.gatewayName }}
      namespace: {{ .Values.gatewayAPI.gatewayNamespace }}
  hostnames: [{{ .Values.gatewayAPI.hostname | quote }}]
  rules:
    - matches:
        - path: {type: PathPrefix, value: /v1/chat}
        - path: {type: PathPrefix, value: /v1/requests}
      backendRefs:
        - name: {{ include "aegis.fullname" . }}-gateway
          port: 80
    - matches:
        - path: {type: PathPrefix, value: /v1/evaluations}
      backendRefs:
        - name: {{ include "aegis.fullname" . }}-evaluation-api
          port: 80
{{- end }}
