name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          cache: true
      - name: Verify formatting
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
      - name: Verify module metadata
        run: go mod tidy && git diff --exit-code -- go.mod go.sum
      - name: Vet
        run: go vet ./...
      - name: Staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@v0.7.0 && staticcheck ./...
      - name: Unit tests
        run: go test -coverprofile=coverage.out ./...
      - name: Race detector
        run: go test -race ./...
      - name: Build commands
        run: go build ./...
      - name: Vulnerability scan
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0 && govulncheck ./...

  integration:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          cache: true
      - name: Testcontainers integration tests
        run: go test -tags=integration -count=1 -timeout=20m ./tests/integration/...

  manifests:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.19.0
      - name: Docker Compose validation
        run: docker compose config --quiet
      - name: Helm lint
        run: helm lint deployments/helm/aegis-ai
      - name: Helm render
        run: helm template aegis deployments/helm/aegis-ai --namespace aegis-ai > rendered.yaml
      - name: Kubernetes schema validation
        run: docker run --rm -v "$PWD:/work" ghcr.io/yannh/kubeconform:v0.7.0 -strict -ignore-missing-schemas /work/rendered.yaml

  container:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service: [gateway, audit-consumer, evaluation-api, evaluation-worker, outbox-relay, mock-provider, admin-cli]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/docker/Dockerfile
          push: false
          load: true
          build-args: SERVICE=${{ matrix.service }}
          tags: aegis-ai/${{ matrix.service }}:ci
      - name: Scan image
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: aegis-ai/${{ matrix.service }}:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

  dependency-review:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
